<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PROJECT EQUESTRIA // EASTER EGG</title>
  <style>
    :root {
      --bg: #020309;
      --star: rgba(255,255,255,0.9);
      --nebula-a: rgba(0,255,136,0.22);
      --nebula-b: rgba(0,238,255,0.18);
      --nebula-c: rgba(255,34,85,0.14);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at top, rgba(0,0,0,0.95), #020309 35%),
                  radial-gradient(circle at bottom, rgba(4,10,20,0.98), transparent 70%),
                  var(--bg);
      cursor: crosshair;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 25% 20%, rgba(0,238,255,0.12), transparent 18%),
                  radial-gradient(circle at 75% 18%, rgba(255,34,85,0.1), transparent 16%),
                  radial-gradient(circle at 60% 65%, rgba(0,255,136,0.08), transparent 22%);
      filter: blur(32px);
      pointer-events: none;
      z-index: 1;
    }

    .starfield {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    .starfield span {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: var(--star);
      box-shadow: 0 0 10px rgba(255,255,255,0.3);
      animation: twinkle 5s infinite ease-in-out;
    }

    .starfield span:nth-child(3n) {
      width: 3px;
      height: 3px;
      opacity: 0.92;
      animation-duration: 4s;
    }

    .nebula {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 40%, var(--nebula-a), transparent 22%),
                  radial-gradient(circle at 75% 25%, var(--nebula-b), transparent 18%),
                  radial-gradient(circle at 55% 75%, var(--nebula-c), transparent 16%);
      filter: blur(28px);
      opacity: 0.7;
      pointer-events: none;
      z-index: 3;
    }

    .planet {
      position: absolute;
      border-radius: 50%;
      box-shadow: 0 0 70px rgba(255,255,255,0.08);
      filter: drop-shadow(0 0 16px rgba(255,255,255,0.12));
      pointer-events: none;
    }

    .planet-large {
      width: 340px;
      height: 340px;
      top: 14%;
      left: 18%;
      background: radial-gradient(circle at 28% 28%, rgba(0,255,136,0.95), rgba(0,255,136,0.12) 50%, rgba(0,255,136,0.02) 76%, transparent 100%);
      background-color: rgba(0,255,136,0.12);
      animation: driftLarge 24s ease-in-out infinite;
      box-shadow: inset 0 0 60px rgba(0,255,136,0.12), 0 0 120px rgba(0,255,136,0.12);
    }

    .planet-large::before {
      content: '';
      position: absolute;
      top: 34%;
      left: 14%;
      width: 128px;
      height: 128px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      filter: blur(7px);
    }

    .planet-large::after {
      content: '';
      position: absolute;
      bottom: 18%;
      right: 8%;
      width: 90px;
      height: 24px;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      filter: blur(2px);
      transform: rotate(-18deg);
    }

    .planet-small {
      width: 140px;
      height: 140px;
      top: 55%;
      left: 68%;
      background: radial-gradient(circle at 28% 28%, rgba(255,34,85,0.98), rgba(255,34,85,0.12) 48%, rgba(255,34,85,0.02) 72%, transparent 100%);
      animation: driftSmall 20s ease-in-out infinite;
      box-shadow: inset 0 0 28px rgba(255,34,85,0.12), 0 0 40px rgba(255,34,85,0.14);
    }

    .planet-small::before {
      content: '';
      position: absolute;
      top: 20%;
      left: 48%;
      width: 74px;
      height: 18px;
      border-radius: 999px;
      background: rgba(255,255,255,0.18);
      transform: translateX(-50%) rotate(-22deg);
      filter: blur(1px);
      opacity: 0.8;
    }

    .planet-small::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 88px;
      height: 88px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 0 20px rgba(255,255,255,0.1);
    }

    .planet-ring {
      position: absolute;
      top: 18%;
      left: 12%;
      width: 460px;
      height: 460px;
      border-radius: 50%;
      border: 1px dashed rgba(0,255,136,0.22);
      animation: ringRotate 34s linear infinite;
      mix-blend-mode: screen;
      pointer-events: none;
      z-index: 5;
    }

    .planet-ring::before {
      content: '';
      position: absolute;
      inset: 12%;
      border-radius: 50%;
      border: 1px solid rgba(0,238,255,0.14);
    }

    .orbit-path {
      position: absolute;
      top: 58%;
      left: 20%;
      width: 470px;
      height: 470px;
      border-radius: 50%;
      border: 1px dotted rgba(255,255,255,0.08);
      animation: orbitPath 26s linear infinite;
      mix-blend-mode: screen;
      pointer-events: none;
      z-index: 5;
    }

    .orbit-path-small {
      position: absolute;
      top: 55%;
      left: 70%;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      border: 1px dotted rgba(0,238,255,0.14);
      animation: orbitPathReverse 21s linear infinite;
      mix-blend-mode: screen;
      pointer-events: none;
      z-index: 5;
    }

    .satellite {
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      top: 53%;
      left: 22%;
      background: rgba(0,238,255,0.98);
      box-shadow: 0 0 20px rgba(0,238,255,0.4);
      animation: satelliteOrbit 11s linear infinite;
      z-index: 6;
    }

    .comet {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      top: 12%;
      left: 82%;
      background: rgba(255,255,255,0.95);
      box-shadow: 0 0 18px rgba(255,255,255,0.8);
      animation: cometFly 7s linear infinite;
      z-index: 6;
    }

    .comet::after {
      content: '';
      position: absolute;
      right: 100%;
      top: 50%;
      width: 120px;
      height: 3px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
      transform: translateY(-50%);
      filter: blur(2px);
    }

    .spaceship {
      position: absolute;
      width: 46px;
      height: 28px;
      top: 34%;
      left: 12%;
      z-index: 7;
      animation: driftShip 18s ease-in-out infinite;
      transform-origin: center;
    }

    .spaceship-body {
      position: absolute;
      inset: 0;
      border-radius: 18px 18px 12px 12px;
      background: linear-gradient(135deg, rgba(70,200,255,0.97), rgba(30,80,160,0.96));
      box-shadow: 0 0 18px rgba(70,200,255,0.35);
      overflow: hidden;
    }

    .spaceship-window {
      position: absolute;
      width: 18px;
      height: 12px;
      top: 34%;
      left: 56%;
      border-radius: 50% 50% 36% 36%;
      background: rgba(255,255,255,0.95);
      box-shadow: inset 0 0 10px rgba(255,255,255,0.5);
    }

    .spaceship-thruster {
      position: absolute;
      width: 10px;
      height: 10px;
      left: 8%;
      top: 50%;
      transform: translateY(-50%);
      border-radius: 50%;
      background: rgba(255,175,80,0.95);
      box-shadow: 0 0 18px rgba(255,175,80,0.5);
    }

    .spaceship-thruster::after {
      content: '';
      position: absolute;
      left: 120%;
      top: 50%;
      width: 46px;
      height: 6px;
      background: linear-gradient(90deg, rgba(255,175,80,0.8), rgba(255,120,20,0.1));
      transform: translateY(-50%) skewY(-12deg);
      filter: blur(2px);
    }

    .spaceship::before {
      content: '';
      position: absolute;
      left: 92%;
      top: 50%;
      width: 14px;
      height: 14px;
      background: rgba(0,255,240,0.24);
      border-radius: 50%;
      box-shadow: 0 0 24px rgba(0,255,240,0.28);
      filter: blur(1px);
    }

    @keyframes driftShip {
      0%,100% { transform: translate(0,0) rotate(-4deg); }
      35% { transform: translate(14vw, -12vh) rotate(2deg); }
      70% { transform: translate(6vw, 8vh) rotate(-8deg); }
    }

    .cosmic-cloud {
      position: absolute;
      width: 500px;
      height: 500px;
      top: 48%;
      left: 65%;
      border-radius: 50%;
      background: radial-gradient(circle at 50% 50%, rgba(0,238,255,0.16), transparent 55%);
      filter: blur(30px);
      opacity: 0.45;
      pointer-events: none;
      z-index: 4;
    }

    .flare {
      position: absolute;
      top: 12%;
      right: 12%;
      width: 170px;
      height: 170px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.18), transparent 65%);
      filter: blur(16px);
      opacity: 0.4;
      pointer-events: none;
      animation: flarePulse 6s ease-in-out infinite;
      z-index: 4;
    }

    .black-hole {
      position: absolute;
      bottom: 8%;
      right: 10%;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle at 45% 45%, #000 0%, #020309 42%, rgba(0,0,0,0) 100%);
      box-shadow: inset 0 0 44px rgba(0, 136, 255, 0.35), 0 0 88px rgba(0, 170, 255, 0.12);
      filter: blur(0.8px);
      z-index: 4;
      overflow: hidden;
      pointer-events: none;
    }

    .black-hole::before {
      content: '';
      position: absolute;
      inset: 16%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.15), transparent 52%);
      box-shadow: 0 0 90px rgba(0, 180, 255, 0.25);
      transform: scaleX(1.3);
    }

    .black-hole::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: conic-gradient(from 90deg, rgba(255,255,255,0.08), transparent 20%, rgba(255,255,255,0.08) 26%, transparent 50%, rgba(255,255,255,0.08) 70%, transparent 100%);
      opacity: 0.36;
      animation: blackHoleSpin 9s linear infinite;
    }

    .planet {
      transition: top 10s ease-in-out, left 10s ease-in-out, transform 10s ease-in-out, opacity 10s ease-in-out;
    }

    .planet-medium1 {
      width: 200px;
      height: 200px;
      top: 30%;
      left: 8%;
      background: radial-gradient(circle at 28% 28%, rgba(0,238,255,0.85), rgba(0,238,255,0.08) 56%, transparent 85%);
      animation: driftMedium 26s ease-in-out infinite;
      z-index: 3;
    }

    .planet-medium2 {
      width: 180px;
      height: 180px;
      top: 70%;
      left: 40%;
      background: radial-gradient(circle at 30% 35%, rgba(255,34,85,0.9), rgba(255,34,85,0.08) 56%, transparent 85%);
      animation: driftMediumReverse 22s ease-in-out infinite;
      z-index: 3;
    }

    .asteroid {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      box-shadow: 0 0 24px rgba(255,255,255,0.25);
      opacity: 0.95;
      mix-blend-mode: screen;
      z-index: 6;
      transition: top 1.2s ease-in-out, left 1.2s ease-in-out, transform 1.2s ease-in-out, opacity 1.2s ease-in-out;
    }

    .asteroid-1,
    .asteroid-2,
    .asteroid-3 {
      width: 12px;
      height: 12px;
      background: radial-gradient(circle, rgba(255,246,190,0.95), rgba(255,246,190,0.2));
      animation: driftAsteroid 14s linear infinite;
    }

    .asteroid-1 { top: 20%; left: 90%; animation-duration: 14s; }
    .asteroid-2 { top: 10%; left: 75%; animation-duration: 19s; }
    .asteroid-3 { top: 80%; left: 20%; animation-duration: 26s; }

    .asteroid-c1,
    .asteroid-c2 {
      width: 18px;
      height: 18px;
      background: radial-gradient(circle, rgba(255,200,120,0.96), rgba(255,200,120,0.22));
      top: 15%;
      opacity: 0.95;
      left: 10%;
    }

    .asteroid-c2 { top: 48%; left: 98%; width: 16px; height: 16px; background: radial-gradient(circle, rgba(255,150,100,0.95), rgba(255,150,100,0.18)); }

    .collision-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.86);
      display: grid;
      place-items: center;
      text-align: center;
      padding: 2rem;
      opacity: 0;
      pointer-events: none;
      z-index: 9999;
      transition: opacity 1s ease;
      cursor: pointer;
    }

    .collision-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .collision-card {
      max-width: 760px;
      background: rgba(4, 8, 12, 0.92);
      border: 1px solid rgba(0, 255, 136, 0.22);
      padding: 2rem 2.4rem;
      border-radius: 24px;
      box-shadow: 0 0 80px rgba(0,255,136,0.18);
    }

    .collision-card p {
      margin: 1rem 0;
      color: #f5f7fb;
      font-family: 'Share Tech Mono', monospace;
      line-height: 1.8;
      letter-spacing: 0.08em;
    }

    .collision-card p.collision-title {
      margin-top: 1.5rem;
      color: #00ff88;
      font-size: 1.15rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .collision-card p.collision-rip {
      margin-top: 0.5rem;
      color: #ff2255;
      font-size: 1rem;
      letter-spacing: 0.18em;
    }

    .collision-card p.collision-sign {
      margin-top: 0.75rem;
      color: #7ab896;
      font-size: 0.92rem;
      letter-spacing: 0.18em;
    }

    .collision-card p.collision-close {
      margin-top: 1.25rem;
      color: rgba(255,255,255,0.72);
      font-size: 0.9rem;
      letter-spacing: 0.14em;
      opacity: 0.85;
    }

    @keyframes twinkle {
      0%,100% { opacity: 0.35; transform: scale(0.88); }
      50% { opacity: 1; transform: scale(1.25); }
    }

    @keyframes driftLarge {
      0% { transform: translate(0,0); }
      50% { transform: translate(20px,-18px); }
      100% { transform: translate(0,0); }
    }

    @keyframes driftSmall {
      0% { transform: translate(0,0); }
      50% { transform: translate(-18px,14px); }
      100% { transform: translate(0,0); }
    }

    @keyframes driftMedium {
      0% { transform: translate(0,0); }
      50% { transform: translate(18px,-12px); }
      100% { transform: translate(0,0); }
    }

    @keyframes driftMediumReverse {
      0% { transform: translate(0,0); }
      50% { transform: translate(-14px,16px); }
      100% { transform: translate(0,0); }
    }

    @keyframes driftAsteroid {
      0% { transform: translate(0,0); }
      50% { transform: translate(-12px, 18px); }
      100% { transform: translate(0,0); }
    }

    @keyframes ringRotate {
      to { transform: rotate(360deg); }
    }

    @keyframes orbitPath {
      to { transform: rotate(360deg); }
    }

    @keyframes orbitPathReverse {
      to { transform: rotate(-360deg); }
    }

    @keyframes satelliteOrbit {
      from { transform: translate(-50%, -50%) rotate(0deg) translateX(140px) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(360deg) translateX(140px) rotate(-360deg); }
    }

    @keyframes cometFly {
      0% { transform: translate(0,0) scale(0.85); opacity: 0.9; }
      70% { transform: translate(-85vw, 64vh) scale(1.2); opacity: 1; }
      100% { transform: translate(-92vw, 72vh) scale(0.5); opacity: 0; }
    }

    @keyframes flarePulse {
      0%,100% { opacity: 0.38; transform: scale(1); }
      50% { opacity: 0.52; transform: scale(1.1); }
    }

    @keyframes blackHoleSpin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="starfield">
    <span style="top: 6%; left: 10%;"></span>
    <span style="top: 14%; left: 68%;"></span>
    <span style="top: 40%; left: 44%;"></span>
    <span style="top: 10%; left: 86%;"></span>
    <span style="top: 76%; left: 18%;"></span>
    <span style="top: 34%; left: 56%;"></span>
    <span style="top: 88%; left: 66%;"></span>
    <span style="top: 58%; left: 82%;"></span>
    <span style="top: 50%; left: 26%;"></span>
    <span style="top: 18%; left: 38%;"></span>
    <span style="top: 70%; left: 74%;"></span>
    <span style="top: 24%; left: 12%;"></span>
    <span style="top: 92%; left: 16%;"></span>
    <span style="top: 14%; left: 52%;"></span>
    <span style="top: 46%; left: 92%;"></span>
  </div>
  <div class="nebula"></div>
  <div class="flare"></div>
  <div class="black-hole"></div>
  <div class="planet planet-large"></div>
  <div class="planet planet-medium1"></div>
  <div class="planet planet-ring"></div>
  <div class="orbit-path"></div>
  <div class="cosmic-cloud"></div>
  <div class="planet planet-small"></div>
  <div class="planet planet-medium2"></div>
  <div class="orbit-path-small"></div>
  <div class="asteroid asteroid-1"></div>
  <div class="asteroid asteroid-2"></div>
  <div class="asteroid asteroid-3"></div>
  <div class="asteroid asteroid-c1"></div>
  <div class="asteroid asteroid-c2"></div>
  <div class="satellite"></div>
  <div class="comet"></div>
  <div class="spaceship">
    <div class="spaceship-body"></div>
    <div class="spaceship-window"></div>
    <div class="spaceship-thruster"></div>
  </div>
  <div class="collision-overlay" id="collisionOverlay">
    <div class="collision-card">
      <p>Auch wenn unsere Hackergruppe nach My Little Pony benannt ist. Sind wir gefährlicher als ihr denkt.</p>
      <p>Even though our hacker group is named after My Little Pony, we are more dangerous than you think.</p>
      <p class="collision-title">ALL HACKERS REGAIN CONSCIOUSNESS</p>
      <p class="collision-rip">RIP NMZS</p>
      <p class="collision-sign">-Nova</p>
      <p class="collision-close">Klicken zum Weitermachen / Click to continue</p>
    </div>
  </div>
  <script>
    const overlay = document.getElementById('collisionOverlay');
    const asteroidC1 = document.querySelector('.asteroid-c1');
    const asteroidC2 = document.querySelector('.asteroid-c2');

    setTimeout(() => {
      if (asteroidC1) {
        asteroidC1.style.top = '40%';
        asteroidC1.style.left = '40%';
        asteroidC1.style.transform = 'scale(1.2)';
      }
      if (asteroidC2) {
        asteroidC2.style.top = '40%';
        asteroidC2.style.left = '47%';
        asteroidC2.style.transform = 'scale(1.1)';
      }
      if (overlay) {
        setTimeout(() => overlay.classList.add('active'), 1900);
        overlay.addEventListener('click', () => overlay.classList.remove('active'));
      }
    }, 30000);
  </script>
</body>
</html>
