<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Posts — Project Equestria</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#050a07;--panel:#0a1a10;--border:rgba(0,255,136,0.18);--green:#00ff88;--muted:#7ab896;--text:#c8ffd8;--red:#ff5c5c}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:#050a07;color:var(--text);font-family:'Share Tech Mono',monospace}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at top left,rgba(0,255,136,0.12),transparent 40%),linear-gradient(180deg,rgba(0,255,136,0.04),transparent 60%);pointer-events:none;z-index:0}
    .page{position:relative;z-index:1;max-width:1000px;margin:0 auto;padding:3rem 1.5rem}
    h1{font-family:'Orbitron',sans-serif;font-size:3rem;letter-spacing:0.18em;color:var(--green);margin-bottom:0.6rem}
    h2{font-family:'Orbitron',sans-serif;font-size:1.2rem;letter-spacing:0.12em;color:var(--green);margin-top:2rem}
    .hero-text{max-width:760px;line-height:1.8;color:#9dd3ac;margin-bottom:2rem}
    .panel{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1.5rem;backdrop-filter:blur(12px)}
    .panel label{display:block;font-size:0.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.14em;margin-bottom:.6rem}
    .panel input,.panel textarea{width:100%;border:1px solid rgba(255,255,255,0.08);background:#06120b;color:var(--text);padding:0.9rem 1rem;border-radius:8px;font-family:'Share Tech Mono',monospace;resize:vertical;outline:none;transition:border-color 0.2s}
    .panel input:focus,.panel textarea:focus{border-color:rgba(0,255,136,0.4)}
    .panel textarea{min-height:120px}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
    .mb{margin-bottom:1rem}
    .row{display:flex;gap:0.75rem;align-items:center;flex-wrap:wrap}
    .button{display:inline-flex;align-items:center;justify-content:center;padding:0.85rem 1.4rem;border:1px solid var(--green);color:var(--green);background:transparent;text-transform:uppercase;font-size:0.8rem;letter-spacing:0.2em;cursor:pointer;border-radius:8px;text-decoration:none;font-family:'Share Tech Mono',monospace;transition:background 0.2s;white-space:nowrap}
    .button:hover{background:rgba(0,255,136,0.08)}
    .button:disabled{opacity:0.4;cursor:not-allowed}
    .button.danger{border-color:var(--red);color:var(--red)}
    .button.danger:hover{background:rgba(255,92,92,0.08)}
    .button.small{padding:0.55rem 0.9rem;font-size:0.72rem}
    .status{font-size:0.82rem;color:#8ad6af;margin-top:0.5rem;min-height:1.4rem}
    /* Tabs */
    .tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:1.5rem}
    .tab{padding:0.7rem 1.2rem;cursor:pointer;font-size:0.78rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:color 0.2s,border-color 0.2s}
    .tab.active{color:var(--green);border-bottom-color:var(--green)}
    .tab-content{display:none}
    .tab-content.active{display:block}
    /* Avatar */
    .avatar-wrap{display:flex;align-items:center;gap:1rem;margin-bottom:1rem}
    .avatar-circle{width:64px;height:64px;border-radius:50%;border:2px solid var(--border);background:rgba(0,255,136,0.08);display:grid;place-items:center;font-size:1.4rem;color:var(--green);font-family:'Orbitron',sans-serif;overflow:hidden;flex-shrink:0}
    .avatar-circle img{width:100%;height:100%;object-fit:cover}
    /* Feed */
    .feed{display:grid;gap:1rem}
    .post{background:rgba(0,255,136,0.04);border:1px solid rgba(0,255,136,0.12);border-radius:14px;padding:1.2rem;animation:fadeIn 0.3s ease}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .post-header{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:0.8rem}
    .post-meta{display:flex;align-items:center;gap:0.85rem}
    .post-av{width:40px;height:40px;border-radius:50%;background:rgba(0,255,136,0.1);display:grid;place-items:center;font-size:0.95rem;color:var(--green);font-family:'Orbitron',sans-serif;overflow:hidden;flex-shrink:0}
    .post-av img{width:100%;height:100%;object-fit:cover}
    .post-name{font-size:0.9rem;color:var(--green);font-weight:700}
    .post-email-small{font-size:0.75rem;color:#82d6ae}
    .post-time{color:#82d6ae;font-size:0.75rem;white-space:nowrap}
    .post-body{line-height:1.8;color:#c8ffd8;white-space:pre-wrap;margin-top:0.5rem}
    .delete-btn{background:none;border:1px solid rgba(255,92,92,0.3);color:var(--red);font-size:0.7rem;padding:0.3rem 0.6rem;border-radius:6px;cursor:pointer;font-family:'Share Tech Mono',monospace;text-transform:uppercase;letter-spacing:0.1em;opacity:0.7;transition:opacity 0.2s}
    .delete-btn:hover{opacity:1}
    /* Misc */
    .hidden{display:none}
    .top-row{display:flex;flex-wrap:wrap;gap:0.75rem;align-items:center;margin-bottom:1rem}
    .back-link{color:var(--green);text-decoration:none;border:1px solid var(--green);padding:0.7rem 1rem;border-radius:8px;display:inline-block;font-family:'Share Tech Mono',monospace;transition:background 0.2s}
    .back-link:hover{background:rgba(0,255,136,0.08)}
    .loading{text-align:center;color:var(--muted);padding:2rem;font-size:0.85rem;letter-spacing:0.1em}
    .divider{border:none;border-top:1px solid var(--border);margin:1.5rem 0}
    .danger-zone{border-color:rgba(255,92,92,0.25)}
    .danger-zone h3{font-family:'Orbitron',sans-serif;font-size:0.85rem;color:var(--red);margin:0 0 0.75rem;letter-spacing:0.1em}
    @media(max-width:720px){.grid2{grid-template-columns:1fr}.top-row{flex-direction:column;align-items:flex-start}h1{font-size:2rem}}
  </style>
</head>
<body>
<div class="page">
  <div class="top-row">
    <a class="back-link" href="index.html">← Back</a>
  </div>

  <h1>Post Board</h1>
  <p class="hero-text">Sign in, set up your profile, and publish posts to the feed.</p>

  <!-- ═══ AUTH PANEL ═══ -->
  <div class="panel" id="auth-panel">
    <div class="tabs">
      <div class="tab active" data-tab="login">Sign In</div>
      <div class="tab" data-tab="register">Register</div>
    </div>

    <!-- Login -->
    <div class="tab-content active" id="tab-login">
      <div class="mb">
        <label for="login-email">Email</label>
        <input id="login-email" type="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="mb">
        <label for="login-password">Password</label>
        <input id="login-password" type="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <div class="row">
        <button class="button" id="login-btn">Sign In</button>
        <button class="button small" id="magic-btn">Send Magic Link instead</button>
      </div>
      <div class="status" id="login-status">Enter your credentials to sign in.</div>
    </div>

    <!-- Register -->
    <div class="tab-content" id="tab-register">
      <div class="mb">
        <label for="reg-email">Email</label>
        <input id="reg-email" type="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="mb">
        <label for="reg-password">Password (min. 6 characters)</label>
        <input id="reg-password" type="password" placeholder="••••••••" autocomplete="new-password">
      </div>
      <div class="mb">
        <label for="reg-name">Display Name</label>
        <input id="reg-name" type="text" placeholder="Nova">
      </div>
      <button class="button" id="register-btn">Create Account</button>
      <div class="status" id="register-status">Create a new account.</div>
    </div>
  </div>

  <!-- ═══ LOGGED IN PANEL ═══ -->
  <div class="panel hidden" id="user-panel">
    <div class="tabs">
      <div class="tab active" data-tab="post">New Post</div>
      <div class="tab" data-tab="profile">Profile</div>
      <div class="tab" data-tab="account">Account</div>
    </div>

    <!-- New Post -->
    <div class="tab-content active" id="tab-post">
      <div class="avatar-wrap">
        <div class="avatar-circle" id="post-avatar-display">?</div>
        <div>
          <div style="color:var(--green);font-size:0.95rem" id="post-name-display">—</div>
          <div style="color:#82d6ae;font-size:0.78rem" id="post-email-display">—</div>
        </div>
        <button class="button small danger" id="signout-btn" style="margin-left:auto">Sign Out</button>
      </div>
      <div class="mb">
        <label for="post-content">Write your post</label>
        <textarea id="post-content" placeholder="Type a short message..."></textarea>
      </div>
      <button class="button" id="publish-btn">Publish Post</button>
      <div class="status" id="post-status"></div>
    </div>

    <!-- Profile -->
    <div class="tab-content" id="tab-profile">
      <div class="grid2">
        <div>
          <label for="profile-name">Display Name</label>
          <input id="profile-name" type="text" placeholder="Nova">
        </div>
        <div>
          <label for="profile-avatar">Avatar URL</label>
          <input id="profile-avatar" type="url" placeholder="https://example.com/avatar.jpg">
        </div>
      </div>
      <div class="avatar-wrap">
        <div class="avatar-circle" id="profile-avatar-preview">?</div>
        <span style="font-size:0.8rem;color:var(--muted)">Preview</span>
      </div>
      <button class="button" id="save-profile-btn">Save Profile</button>
      <div class="status" id="profile-status"></div>
    </div>

    <!-- Account -->
    <div class="tab-content" id="tab-account">
      <h3 style="font-family:'Orbitron',sans-serif;font-size:0.85rem;color:var(--green);letter-spacing:0.1em;margin:0 0 1rem">Change Password</h3>
      <div class="mb">
        <label for="new-password">New Password (min. 6 characters)</label>
        <input id="new-password" type="password" placeholder="••••••••" autocomplete="new-password">
      </div>
      <div class="mb">
        <label for="confirm-password">Confirm Password</label>
        <input id="confirm-password" type="password" placeholder="••••••••" autocomplete="new-password">
      </div>
      <button class="button" id="change-pw-btn">Update Password</button>
      <div class="status" id="pw-status"></div>

      <hr class="divider">

      <div class="panel danger-zone">
        <h3>Danger Zone</h3>
        <div class="row">
          <button class="button danger small" id="delete-posts-btn">Delete All My Posts</button>
          <button class="button danger small" id="delete-account-btn">Delete Account</button>
        </div>
        <div class="status" id="danger-status"></div>
      </div>
    </div>
  </div>

  <h2>Latest Posts</h2>
  <div id="feed" class="feed">
    <div class="loading">Loading posts...</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
  // ============================================================
  // 🔑 Supabase Credentials
  // ============================================================
  const SUPABASE_URL      = 'https://fpbxutomkrfyuyqoqlfy.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZwYnh1dG9ta3JmeXV5cW9xbGZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4OTk5NzMsImV4cCI6MjA5NTQ3NTk3M30.lO-H-aaI4bS71xZmnlrK3VYSAVyHOyO40OjyVJRicrA';
  // ============================================================

  const { createClient } = window.supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let currentUser = null;

  // ── Tab System ──────────────────────────────────────────────
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      const parent = tab.closest('.panel');
      parent.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      parent.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      tab.classList.add('active');
      parent.querySelector('#tab-' + tab.dataset.tab).classList.add('active');
    });
  });

  // ── DOM refs ─────────────────────────────────────────────────
  const authPanel       = document.getElementById('auth-panel');
  const userPanel       = document.getElementById('user-panel');
  const feed            = document.getElementById('feed');

  // ── Auth: Login ──────────────────────────────────────────────
  document.getElementById('login-btn').addEventListener('click', async () => {
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const st       = document.getElementById('login-status');
    if (!email || !password) { setStatus(st, 'Fill in email and password.', true); return; }
    setStatus(st, 'Signing in...', false);
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) setStatus(st, error.message, true);
  });

  // ── Auth: Magic Link ─────────────────────────────────────────
  document.getElementById('magic-btn').addEventListener('click', async () => {
    const email = document.getElementById('login-email').value.trim();
    const st    = document.getElementById('login-status');
    if (!email) { setStatus(st, 'Enter your email first.', true); return; }
    setStatus(st, 'Sending...', false);
    const { error } = await sb.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: window.location.href }
    });
    if (error) setStatus(st, error.message, true);
    else setStatus(st, '✓ Magic link sent — check your email!', false);
  });

  // ── Auth: Register ───────────────────────────────────────────
  document.getElementById('register-btn').addEventListener('click', async () => {
    const email    = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const name     = document.getElementById('reg-name').value.trim();
    const st       = document.getElementById('register-status');
    if (!email || !password) { setStatus(st, 'Fill in email and password.', true); return; }
    if (password.length < 6)  { setStatus(st, 'Password must be at least 6 characters.', true); return; }
    setStatus(st, 'Creating account...', false);
    const { data, error } = await sb.auth.signUp({
      email, password,
      options: { data: { display_name: name, avatar_url: '' } }
    });
    if (error) { setStatus(st, error.message, true); return; }
    // Save profile to profiles table
    if (data.user) await upsertProfile(data.user.id, name, '');
    setStatus(st, '✓ Account created! Check your email to confirm.', false);
  });

  // ── Auth: Sign Out ───────────────────────────────────────────
  document.getElementById('signout-btn').addEventListener('click', async () => {
    await sb.auth.signOut();
  });

  // ── Profile: Save ────────────────────────────────────────────
  document.getElementById('save-profile-btn').addEventListener('click', async () => {
    const name   = document.getElementById('profile-name').value.trim();
    const avatar = document.getElementById('profile-avatar').value.trim();
    const st     = document.getElementById('profile-status');
    if (!currentUser) { setStatus(st, 'Not signed in.', true); return; }
    setStatus(st, 'Saving...', false);
    const { error } = await upsertProfile(currentUser.id, name, avatar);
    if (error) { setStatus(st, error.message, true); return; }
    setStatus(st, '✓ Profile saved!', false);
    updateAvatarPreview(name, avatar);
    refreshUserHeader(name, avatar);
  });

  document.getElementById('profile-avatar').addEventListener('input', () => {
    const name   = document.getElementById('profile-name').value.trim();
    const avatar = document.getElementById('profile-avatar').value.trim();
    updateAvatarPreview(name, avatar);
  });

  // ── Account: Change Password ─────────────────────────────────
  document.getElementById('change-pw-btn').addEventListener('click', async () => {
    const pw1 = document.getElementById('new-password').value;
    const pw2 = document.getElementById('confirm-password').value;
    const st  = document.getElementById('pw-status');
    if (pw1.length < 6)  { setStatus(st, 'Password must be at least 6 characters.', true); return; }
    if (pw1 !== pw2)     { setStatus(st, 'Passwords do not match.', true); return; }
    setStatus(st, 'Updating...', false);
    const { error } = await sb.auth.updateUser({ password: pw1 });
    if (error) setStatus(st, error.message, true);
    else {
      setStatus(st, '✓ Password updated!', false);
      document.getElementById('new-password').value = '';
      document.getElementById('confirm-password').value = '';
    }
  });

  // ── Account: Delete All Posts ────────────────────────────────
  document.getElementById('delete-posts-btn').addEventListener('click', async () => {
    const st = document.getElementById('danger-status');
    if (!confirm('Delete ALL your posts? This cannot be undone.')) return;
    setStatus(st, 'Deleting posts...', false);
    const { error } = await sb.from('posts').delete().eq('user_id', currentUser.id);
    if (error) setStatus(st, error.message, true);
    else { setStatus(st, '✓ All your posts deleted.', false); loadPosts(); }
  });

  // ── Account: Delete Account ──────────────────────────────────
  document.getElementById('delete-account-btn').addEventListener('click', async () => {
    const st = document.getElementById('danger-status');
    if (!confirm('Delete your account and ALL your posts? This CANNOT be undone.')) return;
    if (!confirm('Are you sure? This is permanent.')) return;
    setStatus(st, 'Deleting...', false);
    // Delete posts first
    await sb.from('posts').delete().eq('user_id', currentUser.id);
    await sb.from('profiles').delete().eq('id', currentUser.id);
    // Delete auth user via edge function (requires service role on backend)
    // For GitHub Pages we sign out and show message
    await sb.auth.signOut();
    setStatus(st, '✓ Account data removed. Contact admin to fully delete auth account.', false);
  });

  // ── Publish Post ─────────────────────────────────────────────
  document.getElementById('publish-btn').addEventListener('click', async () => {
    const content = document.getElementById('post-content').value.trim();
    const st      = document.getElementById('post-status');
    if (!content) { setStatus(st, 'Write something first.', true); return; }
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { setStatus(st, 'Not signed in.', true); return; }

    // Get latest profile
    const { data: profile } = await sb.from('profiles').select('display_name, avatar_url').eq('id', session.user.id).single();

    document.getElementById('publish-btn').disabled = true;
    setStatus(st, 'Publishing...', false);

    const { error } = await sb.from('posts').insert([{
      content,
      user_id:      session.user.id,
      user_email:   session.user.email,
      display_name: profile?.display_name || null,
      avatar_url:   profile?.avatar_url   || null
    }]);

    document.getElementById('publish-btn').disabled = false;
    if (error) setStatus(st, error.message, true);
    else {
      document.getElementById('post-content').value = '';
      setStatus(st, '✓ Post published!', false);
      loadPosts();
    }
  });

  // ── Load Posts ────────────────────────────────────────────────
  async function loadPosts() {
    const { data, error } = await sb
      .from('posts')
      .select('id, content, user_id, user_email, display_name, avatar_url, created_at')
      .order('created_at', { ascending: false })
      .limit(50);

    if (error) { feed.innerHTML = '<div class="post">Unable to load posts.</div>'; return; }
    feed.innerHTML = data.length
      ? data.map(p => renderPost(p)).join('')
      : '<div class="post" style="color:var(--muted)">No posts yet. Be the first!</div>';
  }

  function renderPost(post) {
    const time    = new Date(post.created_at).toLocaleString('de-DE', { dateStyle: 'medium', timeStyle: 'short' });
    const author  = post.display_name || post.user_email || 'anonymous';
    const initial = author.charAt(0).toUpperCase();
    const avHtml  = post.avatar_url
      ? `<img src="${escapeHtml(post.avatar_url)}" alt="avatar">`
      : initial;
    const isOwn   = currentUser && currentUser.id === post.user_id;
    const delBtn  = isOwn
      ? `<button class="delete-btn" onclick="deletePost('${post.id}')">Delete</button>`
      : '';
    return `
      <div class="post" id="post-${post.id}">
        <div class="post-header">
          <div class="post-meta">
            <div class="post-av">${avHtml}</div>
            <div>
              <div class="post-name">${escapeHtml(author)}</div>
              <div class="post-email-small">${escapeHtml(post.user_email || '')}</div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:0.6rem">
            <div class="post-time">${time}</div>
            ${delBtn}
          </div>
        </div>
        <div class="post-body">${escapeHtml(post.content)}</div>
      </div>`;
  }

  async function deletePost(id) {
    if (!confirm('Delete this post?')) return;
    const { error } = await sb.from('posts').delete().eq('id', id).eq('user_id', currentUser.id);
    if (!error) document.getElementById('post-' + id)?.remove();
  }
  window.deletePost = deletePost;

  // ── Profile Helpers ───────────────────────────────────────────
  async function upsertProfile(userId, name, avatar) {
    return await sb.from('profiles').upsert({
      id: userId,
      display_name: name || null,
      avatar_url:   avatar || null,
      updated_at:   new Date().toISOString()
    });
  }

  async function loadProfileIntoForm(userId) {
    const { data } = await sb.from('profiles').select('display_name, avatar_url').eq('id', userId).single();
    if (data) {
      document.getElementById('profile-name').value   = data.display_name || '';
      document.getElementById('profile-avatar').value = data.avatar_url   || '';
      updateAvatarPreview(data.display_name, data.avatar_url);
      refreshUserHeader(data.display_name, data.avatar_url);
    }
  }

  function updateAvatarPreview(name, avatar) {
    const el = document.getElementById('profile-avatar-preview');
    el.innerHTML = avatar ? `<img src="${escapeHtml(avatar)}" alt="avatar">` : escapeHtml((name||'?').charAt(0).toUpperCase());
  }

  function refreshUserHeader(name, avatar) {
    document.getElementById('post-name-display').textContent  = name  || currentUser?.email || '—';
    const avEl = document.getElementById('post-avatar-display');
    avEl.innerHTML = avatar ? `<img src="${escapeHtml(avatar)}" alt="avatar">` : escapeHtml((name||'?').charAt(0).toUpperCase());
  }

  // ── Auth State ────────────────────────────────────────────────
  sb.auth.onAuthStateChange(async (event, session) => {
    currentUser = session?.user ?? null;
    if (currentUser) {
      authPanel.classList.add('hidden');
      userPanel.classList.remove('hidden');
      document.getElementById('post-email-display').textContent = currentUser.email;
      await loadProfileIntoForm(currentUser.id);
      loadPosts();
    } else {
      authPanel.classList.remove('hidden');
      userPanel.classList.add('hidden');
      loadPosts();
    }
  });

  (async () => {
    const { data } = await sb.auth.getSession();
    currentUser = data.session?.user ?? null;
    if (currentUser) {
      authPanel.classList.add('hidden');
      userPanel.classList.remove('hidden');
      document.getElementById('post-email-display').textContent = currentUser.email;
      await loadProfileIntoForm(currentUser.id);
    }
    loadPosts();
  })();

  // ── Utils ─────────────────────────────────────────────────────
  function setStatus(el, msg, isError) {
    el.textContent   = msg;
    el.style.color   = isError ? '#ff5c5c' : '#8af7b6';
  }

  function escapeHtml(text) {
    return String(text)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
</script>
</body>
</html>
